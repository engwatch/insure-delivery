async function go(){const p=document.getElementById('p').value;try{const raw=Uint8Array.from(atob(D),c=>c.charCodeAt(0));
const salt=raw.slice(0,16),nonce=raw.slice(16,28),ct=raw.slice(28);
const kdf=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);
const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},kdf,{name:'AES-GCM',length:256},false,['decrypt']);
const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:nonce},key,ct);
const html=new TextDecoder().decode(pt);document.open();document.write(html);document.close();
}catch(e){document.getElementById('e').style.display='block'}}
</script></body></html>
