function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const pwd=document.getElementById('p').value;
  const err=document.getElementById('err');
  err.textContent='';
  try{
    const keyMat=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:100000,hash:'SHA-256'},keyMat,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT));
    const html=new TextDecoder().decode(pt);
    const doc=new DOMParser().parseFromString(html,'text/html');
    const head=doc.head;
    const fontLink=document.createElement('link');
    fontLink.rel='stylesheet';
    fontLink.href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap';
    head.insertBefore(fontLink,head.firstChild);
    const preconnect1=document.createElement('link');
    preconnect1.rel='preconnect';
    preconnect1.href='https://fonts.googleapis.com';
    head.insertBefore(preconnect1,head.firstChild);
    const preconnect2=document.createElement('link');
    preconnect2.rel='preconnect';
    preconnect2.href='https://fonts.gstatic.com';
    preconnect2.crossOrigin='';
    head.insertBefore(preconnect2,head.firstChild);
    const out='<!doctype html>
'+doc.documentElement.outerHTML;
    document.open();
    document.write(out);
    document.close();
  }catch(ex){
    err.textContent='Неверный пароль';
  }
});
